services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: siloker-app
    container_name: siloker_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - siloker_network

  web:
    image: nginx:alpine
    container_name: siloker_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - siloker_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: siloker_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_siloker}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-siloker}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - siloker_network

networks:
  siloker_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
